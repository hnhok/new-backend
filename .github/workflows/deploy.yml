name: Deploy Backend to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          # 1. 确保服务器具备 Git 和 Docker 环境
          sudo apt-get update -y || echo "Skip update"
          sudo apt-get install -y git curl || echo "Git/curl installed or failed"
          
          if ! command -v docker &> /dev/null; then
            echo "正在安装 Docker Runtime..."
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo usermod -aG docker $USER
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.21.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          mkdir -p /app/cms-backend
          cd /app/cms-backend
          
          # 2. 拉取或更新项目代码
          if [ -d ".git" ]; then
            sudo git pull origin master
          else
            sudo git clone https://github.com/hnhok/new-backend.git .
          fi
          
          # 3. 集联启动容器
          sudo docker-compose up -d --build backend
