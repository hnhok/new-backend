name: Deploy Backend to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y || echo "Skip apt update"
          sudo apt-get install -y git curl docker.io || true
          
          # 配置 Docker 国内加速镜像源，防止拉取 node 基础镜像被墙阻断
          sudo mkdir -p /etc/docker
          sudo tee /etc/docker/daemon.json <<-'EOF'
          {
            "registry-mirrors": [
              "https://docker.m.daocloud.io",
              "https://docker.nju.edu.cn",
              "https://mirror.baidubce.com"
            ]
          }
          EOF
          
          sudo systemctl enable docker || true
          sudo systemctl restart docker || true

          mkdir -p /app/cms-backend
          cd /app/cms-backend
          
          if [ -d ".git" ]; then
            sudo git reset --hard
            sudo git pull origin master || (echo "Git pull failed, trying proxy..." && sudo git pull https://mirror.ghproxy.com/https://github.com/hnhok/new-backend.git master)
          else
            sudo rm -rf *
            sudo git clone https://github.com/hnhok/new-backend.git . || (echo "Git clone failed, trying proxy..." && sudo git clone https://mirror.ghproxy.com/https://github.com/hnhok/new-backend.git .)
          fi
          
          sudo docker stop cms-backend || true
          sudo docker rm cms-backend || true
          sudo docker volume create backend-sqlite-data || true
          sudo docker build -t cms-backend .
          sudo docker run -d --name cms-backend -p 3000:3000 -v backend-sqlite-data:/app/prisma -e NODE_ENV=production --restart always cms-backend
