name: Deploy Backend to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y || echo "Skip apt update"
          sudo apt-get install -y git curl docker.io || true
          
          # 配置 Docker 国内加速镜像源，增加更多可用节点
          sudo mkdir -p /etc/docker
          sudo tee /etc/docker/daemon.json <<-'EOF'
          {
            "registry-mirrors": [
              "https://docker.m.daocloud.io",
              "https://dockerproxy.com",
              "https://docker.nju.edu.cn",
              "https://mirror.baidubce.com",
              "https://ccr.ccs.tencentyun.com"
            ]
          }
          EOF
          
          sudo systemctl enable docker || true
          sudo systemctl restart docker || true

          mkdir -p /app/cms-backend
          cd /app/cms-backend
          
          # ==== 终极五重保险 Git Pull/Clone ====
          if [ -d ".git" ]; then
            sudo git reset --hard || true
            sudo timeout 30s git pull origin master || \
            sudo timeout 30s git pull https://hub.fastgit.xyz/hnhok/new-backend.git master || \
            sudo timeout 30s git pull https://mirror.ghproxy.com/https://github.com/hnhok/new-backend.git master || \
            sudo timeout 30s git pull https://gitclone.com/github.com/hnhok/new-backend.git master || \
            (echo "All pull attempts failed." && exit 1)
          else
            sudo rm -rf * || true
            sudo timeout 30s git clone https://github.com/hnhok/new-backend.git . || \
            sudo timeout 30s git clone https://hub.fastgit.xyz/hnhok/new-backend.git . || \
            sudo timeout 30s git clone https://mirror.ghproxy.com/https://github.com/hnhok/new-backend.git . || \
            sudo timeout 30s git clone https://gitclone.com/github.com/hnhok/new-backend.git . || \
            (echo "All clone attempts failed." && exit 1)
          fi
          
          sudo docker stop cms-backend || true
          sudo docker rm cms-backend || true
          sudo docker volume create backend-sqlite-data || true
          sudo docker build -t cms-backend .
          sudo docker run -d --name cms-backend -p 3000:3000 -v backend-sqlite-data:/app/prisma -e NODE_ENV=production --restart always cms-backend
