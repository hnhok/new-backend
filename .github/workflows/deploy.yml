name: Deploy Backend to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Copy files via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        source: "."
        target: "/app/cms-backend"
        rm: true # 部署前自动清空目标目录，防止残留

    - name: Build and Run Docker
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          cd /app/cms-backend
          
          # 依然保留 Docker 国内镜像源配置，确保拉取 node 镜像飞速
          sudo mkdir -p /etc/docker
          sudo tee /etc/docker/daemon.json <<-'EOF'
          {
            "registry-mirrors": [
              "https://mirror.baidubce.com",
              "https://docker.m.daocloud.io",
              "https://dockerproxy.com"
            ]
          }
          EOF
          sudo systemctl restart docker || true

          sudo docker stop cms-backend || true
          sudo docker rm cms-backend || true
          sudo docker volume create backend-sqlite-data || true
          sudo docker build -t cms-backend .
          sudo docker run -d --name cms-backend -p 3000:3000 -v backend-sqlite-data:/app/prisma -e NODE_ENV=production --restart always cms-backend
